name: publish-gh-pages
on:
  push:
jobs:
  publish-gh-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🚛
        uses: actions/checkout@v2
        with:
          persist-credentials: false
      - name: Restore Eurostile fonts 🔤
        run: |
          mkdir -p src/assets/fonts/Eurostile
          echo "${{ secrets.FONT_EUROSTILE_GZ }}"          | base64 -d | gunzip > src/assets/fonts/Eurostile/Eurostile.ttf
          echo "${{ secrets.FONT_EUROSTILE_BOLD_GZ }}"     | base64 -d | gunzip > src/assets/fonts/Eurostile/Eurostile-Bold.ttf
          echo "${{ secrets.FONT_EUROSTILE_EXTENDED2_BOLD }}" | base64 -d        > src/assets/fonts/Eurostile/Eurostile-Extended2-Bold.otf
      - name: Install and Build 🚧
        run: |
          npm install
          npm run build
      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@4.1.1
        with:
          branch: gh-pages
          folder: dist
