name: update-bar-json
on:
  workflow_dispatch:
  #schedule:
  #  - cron: '*/5 * * * *'
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          persist-credentials: false
      - name: Update taps.json
        run: curl https://bar.emf.camp/api/cybar-on-tap.json > src/data/taps.json
      - name: Update bar.json
        run: |
          python3 - <<'EOF'
          import json, urllib.request

          url = 'https://bar.emf.camp/api/stocklines.json?type=continuous&location=Null%20Sector&output=full'
          resp = urllib.request.urlopen(url)
          data = json.load(resp)

          cybar = []
          for sl in data['stocklines']:
              st = sl['stocktype']
              cybar.append({
                  'key': st['key'],
                  'id': st['id'],
                  'department': {
                      'id': st['department']['id'],
                      'description': st['department']['description'],
                  },
                  'manufacturer': st['manufacturer'],
                  'name': st['name'],
                  'abv': st.get('abv'),
                  'fullname': st['fullname'],
                  'price': st['price'],
                  'logo': st.get('logo'),
                  'base_units_remaining': st['base_units_remaining'],
                  'sale_unit_name': st['sale_unit_name'],
              })

          with open('src/data/bar.json', 'w') as f:
              json.dump({'cybar': cybar}, f, indent=2)
              f.write('\n')
          print(f'Wrote {len(cybar)} items')
          EOF
      - name: Commit changes
        uses: EndBug/add-and-commit@v4
        with:
          add: 'src'
          author_name: 'Bar Bot'
          author_email: 'marekventur+barbot@gmail.com'
          message: 'Update'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Install and Build 🚧
        run: |
          npm install
          npm run build
      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@4.1.1
        with:
          branch: gh-pages
          folder: dist
